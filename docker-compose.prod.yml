# ═══════════════════════════════════════════════
# TechPulse — Docker Compose Production
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# ═══════════════════════════════════════════════

services:
  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: techpulse-mongo-prod
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=techpulse
    networks:
      - techpulse-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Express API ──
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server.prod
    container_name: techpulse-server-prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/techpulse
      - JWT_SECRET=${JWT_SECRET:-techpulse_prod_secret_change_me}
      - JWT_EXPIRE=7d
    depends_on:
      - mongo
    volumes:
      - uploads-data:/app/uploads
    networks:
      - techpulse-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ── React (Nginx) ──
  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client.prod
    container_name: techpulse-client-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - techpulse-network
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongo-data:
    driver: local
  uploads-data:
    driver: local

networks:
  techpulse-network:
    driver: bridge